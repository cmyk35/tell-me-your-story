<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mini Journal{% endblock %}</title>
  <link rel="stylesheet" href="/assets/style.css">
  {% block head_extra %}{% endblock %}
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="{{ url_for('journal.index') }}">Home</a>
        <a href="{{ url_for('journal.entries_list') }}">Entries</a>
        <a href="{{ url_for('journal.new_entry') }}">New Entry</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      {% block body %}{% endblock %}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Tell me your thoughts!</p>
    </div>
  </footer>

  {% block scripts %}{% endblock %}

</body>
</html>
