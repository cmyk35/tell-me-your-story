<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Entry</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="/">Home</a>
        <a href="/entries">Entries</a>
        <a href="/new">New Entry</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>New Entry</h1>

      <form class="entry-form" action="#" method="post">

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="What's this entry about?">
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date">
        </div>

        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" rows="8" placeholder="Write something..."></textarea>
        </div>

        <button type="submit" class="btn">Save Entry</button>

      </form>

      <p class="form-note">Note: This doesn't save anywhere yet</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Tell me your thoughts!</p>
    </div>
  </footer>

</body>
</html>
