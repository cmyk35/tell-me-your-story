{% extends 'base.html' %}

{% block title %}New Entry{% endblock %}

{% block body %}
  <h1>New Entry</h1>
  {% if error %}
    <p style="color: tomato;">{{ error }}</p>
  {% endif %}

  <form class="entry-form" action="{{ url_for('journal.create_entry') }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" value="{{ request.form.get('title', '') }}" placeholder="What's this entry about?" required>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" name="date" value="{{ request.form.get('date', '') }}" required>
    </div>

    <div class="form-group">
      <label for="content">Content</label>
      <textarea id="content" name="content" rows="8" maxlength="5000" placeholder="Write something..." required>{{ request.form.get('content', '') }}</textarea>
      <p id="content-counter" class="form-note">0 / 5000 characters</p>
    </div>

    <button type="submit" class="btn">Save Entry</button>

  </form>
{% endblock %}

{% block scripts %}
  <script>
    const content = document.getElementById('content');
    const counter = document.getElementById('content-counter');

    if (content && counter) {
      const limit = 5000;

      function updateCounter() {
        counter.textContent = `${content.value.length} / ${limit} characters`;
      }

      content.addEventListener('input', updateCounter);
      updateCounter();
    }
  </script>
{% endblock %}
