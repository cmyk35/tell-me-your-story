<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ entry.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="/">Home</a>
        <a href="/entries">Entries</a>
        <a href="/new">New Entry</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>Edit Entry</h1>

      <form class="entry-form" action="{{ url_for('journal.update_entry', entry_id=entry.id) }}" method="post">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" value="{{ entry.title }}" required>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" value="{{ entry.date.isoformat() if entry.date else '' }}" required>
        </div>

        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" rows="8" required>{{ entry.content }}</textarea>
        </div>

        <button type="submit" class="btn">Update Entry</button>
      </form>

      <form action="{{ url_for('journal.delete_entry', entry_id=entry.id) }}" method="post" style="margin-top: 1rem;">
        <button type="submit" class="btn" style="background-color: #8b1e1e;">Delete Entry</button>
      </form>

      <a href="/entries" class="btn" style="margin-top: 1rem; display: inline-block;">Back to Entries</a>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Tell me your thoughts!</p>
    </div>
  </footer>

</body>
</html>
