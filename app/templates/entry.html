{% extends 'base.html' %}

{% block title %}{{ entry.title }}{% endblock %}

{% block body %}
  <h1>Edit Entry</h1>
  {% if error %}
    <p style="color: tomato;">{{ error }}</p>
  {% endif %}

  <form class="entry-form" action="{{ url_for('journal.update_entry', entry_id=entry.id) }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" value="{{ request.form.get('title') or entry.title }}" required>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" name="date" value="{{ request.form.get('date') or (entry.date.isoformat() if entry.date else '') }}" required>
    </div>

    <div class="form-group">
      <label for="content">Content</label>
      <textarea id="content" name="content" rows="8" maxlength="5000" required>{{ request.form.get('content') or entry.content }}</textarea>
      <p id="content-counter" class="form-note">0 / 5000 characters</p>
    </div>

    <button type="submit" class="btn">Update Entry</button>
  </form>

  <form action="{{ url_for('journal.delete_entry', entry_id=entry.id) }}" method="post" style="margin-top: 1rem;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn" style="background-color: #8b1e1e;">Delete Entry</button>
  </form>

  <a href="{{ url_for('journal.entries_list') }}" class="btn" style="margin-top: 1rem; display: inline-block;">Back to Entries</a>
{% endblock %}

{% block scripts %}
  <script>
    const content = document.getElementById('content');
    const counter = document.getElementById('content-counter');

    if (content && counter) {
      const limit = 5000;

      function updateCounter() {
        counter.textContent = `${content.value.length} / ${limit} characters`;
      }

      content.addEventListener('input', updateCounter);
      updateCounter();
    }
  </script>
{% endblock %}
