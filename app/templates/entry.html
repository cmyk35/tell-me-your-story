<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ entry.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="/">Home</a>
        <a href="/entries">Entries</a>
        <a href="/new">New Entry</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <span class="date">{{ entry.date }}</span>
      <h1>{{ entry.title }}</h1>
      <p>{{ entry.content }}</p>
      <a href="/entries" class="btn" style="margin-top: 1rem; display: inline-block;">← Back to Entries</a>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Tell me your thoughts!</p>
    </div>
  </footer>

</body>
</html>
